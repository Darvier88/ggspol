name: Compilar games.json

# Recompila games.json cada vez que cambian los juegos desde el panel /admin.
on:
  push:
    branches: [main]
    paths:
      - "content/juegos/**"
      - "scripts/build-games.py"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pyyaml

      - name: Compilar games.json
        run: python scripts/build-games.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain games.json)" ]; then
            git add games.json
            git commit -m "build: actualizar games.json"
            git push
          else
            echo "Sin cambios en games.json"
          fi
